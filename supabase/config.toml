# Supabase local configuration (A2 §11).
# The HOSTED project must be created in an EU region (London/Frankfurt) for UK
# data residency (CR-DATA-1) — region is chosen at project creation, not here.
# Run `supabase start` for the local stack; `supabase db push` / Drizzle for schema.

project_id = "gns-onboarding"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"
