name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm --filter @gns/web build
        env:
          # Build must succeed without real secrets (M0 foundation).
          NEXT_TELEMETRY_DISABLED: "1"
