name: Build and deploy to cPanel

# Builds the self-contained standalone bundle on GitHub's servers (so cPanel
# never has to build anything) and syncs it to the cPanel account via FTP.
# Requires three repository secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    name: Build standalone bundle and FTP to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # hoisted node-linker: flat real directories instead of pnpm's symlink
        # store — symlinks do not survive FTP and produce a broken node_modules
        # on the server.
        run: pnpm install --frozen-lockfile
        env:
          NPM_CONFIG_NODE_LINKER: hoisted

      - name: Build cPanel standalone bundle
        run: pnpm --filter @gns/web build:cpanel
        env:
          NPM_CONFIG_NODE_LINKER: hoisted

      - name: Sync bundle to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: apps/web/.next/standalone/
          server-dir: gns-app/
          # The action's DEFAULT exclude list skips **/node_modules/** — but the
          # standalone bundle's node_modules IS the app's runtime. Override the
          # excludes so the pruned node_modules ships with the bundle.
          exclude: |
            **/.git*
            **/.git*/**
